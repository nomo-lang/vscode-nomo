name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test server launch and language contracts
        run: npm test

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v$version"

      - name: Build extension
        run: npm run build

      - name: Package VSIX
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          mkdir -p release
          prerelease_args=()
          if [[ "$version" == 0.0.0-* ]]; then
            prerelease_args+=(--pre-release)
          fi
          npm run package -- "${prerelease_args[@]}" --out "release/vscode-nomo-$version.vsix"

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: vscode-nomo-vsix
          path: release/*.vsix
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v8
        with:
          name: vscode-nomo-vsix
          path: release

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          prerelease_args=()
          if [[ "$GITHUB_REF_NAME" == v0.0.0-* ]]; then
            prerelease_args+=(--prerelease)
          fi
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" release/* \
              --generate-notes \
              --verify-tag \
              "${prerelease_args[@]}" \
              --title "Nomo for VS Code $GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY"
          fi

  publish-marketplace:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX
        uses: actions/download-artifact@v8
        with:
          name: vscode-nomo-vsix
          path: release

      - name: Publish to Visual Studio Marketplace
        if: env.VSCE_PAT != ''
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          prerelease_args=()
          if [[ "$version" == 0.0.0-* ]]; then
            prerelease_args+=(--pre-release)
          fi
          npm run publish:marketplace -- "${prerelease_args[@]}" --packagePath release/*.vsix -p "$VSCE_PAT"

      - name: Skip Marketplace publication without credentials
        if: env.VSCE_PAT == ''
        run: echo "VSCE_PAT is not configured; the VSIX remains available from the GitHub release."

  publish-open-vsx:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX
        uses: actions/download-artifact@v8
        with:
          name: vscode-nomo-vsix
          path: release

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        shell: bash
        run: npm run publish:openvsx -- release/*.vsix

      - name: Skip Open VSX publication without credentials
        if: env.OVSX_PAT == ''
        run: echo "OVSX_PAT is not configured; the VSIX remains available from the GitHub release."
