name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vscode-nomo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test server launch and language contracts
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Package VSIX
        run: npm run package
